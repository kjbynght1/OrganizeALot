name: Build OrganizeALot Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.4.1'

      - name: Install Capacitor dependencies cleanly
        run: |
          rm -rf node_modules package-lock.json
          npm config set registry https://registry.npmjs.org/
          npm install --include=dev --no-audit --no-fund --package-lock=false @capacitor/core@8.4.2 @capacitor/android@8.4.2 @capacitor/cli@8.4.2

      - name: Sync Capacitor Android project
        run: node node_modules/@capacitor/cli/bin/capacitor sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OrganizeALot-Build023-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
