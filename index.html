<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#172554" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <title>OrganizeALot v2.0.2</title>
</head>
<body>
  <header>
    <div>
      <h1>OrganizeALot</h1>
      <p>Shoot Fast. Leave Confident.</p>
    </div>
    <button id="installBtn" class="ghost hidden">Install</button>
  </header>

  <main>
    <section id="setup" class="card">
      <h2>New Inspection</h2>
      <label>Inspection ID <input id="inspectionId" placeholder="NIIS / Inspection ID"></label>
      <label>Address <input id="address" placeholder="Property address"></label>
      <div class="mapCheck">
        <button id="mapCheckBtn" type="button" class="ghost full">🗺️ Check Map / Street View</button>
        <p class="small">Use this before driving to verify the address is a real structure, not an empty field or wrong GPS point.</p>
      </div>
      <label>Insured Name <input id="insured" placeholder="Insured name"></label>
      <label>Inspection Type
        <select id="inspectionType">
          <option>Residential</option><option>Apartment</option><option>Commercial</option><option>USAA</option><option>Other</option>
        </select>
      </label>
      <button id="startBtn" class="primary">Start / Save Inspection</button>
    </section>

    <section id="dashboard" class="hidden">
      <div class="inspectionBar card">
        <strong id="activeTitle">No inspection</strong>
        <span id="activeSub"></span>
      </div>
      <div class="gridBtns">
        <button class="big sectionBtn" data-section="exterior">🏠<span>House Exterior</span><b id="count-exterior">0</b></button>
        <button class="big sectionBtn" data-section="interior">🛋️<span>Interior</span><b id="count-interior">0</b></button>
        <button class="big sectionBtn" data-section="outbuildings">🏚️<span>Outbuildings</span><b id="count-outbuildings">0</b></button>
        <button class="big danger" id="departureBtn">📋<span>Departure Check</span><b id="statusBadge">Manual</b></button>
      </div>
      <button id="exportBtn" class="ghost full">Export Inspection Summary</button>
      <button id="resetBtn" class="ghost full">Start Different Inspection</button>
    </section>

    <section id="capture" class="hidden card">
      <div class="row"><button id="backDash" class="ghost">← Back</button><h2 id="sectionTitle">Section</h2></div>
      <input id="photoInput" class="hidden" type="file" accept="image/*" capture="environment" multiple>
      <button id="takePhoto" class="primary huge">📷 Take Photo</button>
      <button id="addNoteBtn" class="ghost full">✍️ Add Section Note</button>
      <textarea id="sectionNote" class="hidden" placeholder="Example: rear blocked by locked gate"></textarea>
      <div id="thumbs" class="thumbs"></div>
    </section>

    <section id="departure" class="hidden card">
      <div class="row"><button id="backDash2" class="ghost">← Back</button><h2>Departure Check</h2></div>
      <p class="small">Manual v2.0.1 checklist. AI detection comes next.</p>
      <div id="checklists"></div>
      <label>Final note <textarea id="finalNote" placeholder="Anything NIIS/client may ask about..."></textarea></label>
      <button id="readyBtn" class="primary full">Update Ready Status</button>
      <div id="readyStatus" class="status"></div>
    </section>
  </main>

  <template id="checkTemplate">
    <details open class="checkGroup"><summary></summary><div class="checks"></div></details>
  </template>

  <script src="app.js"></script>
</body>
</html>
